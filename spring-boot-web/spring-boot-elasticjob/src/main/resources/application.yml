server:
  port: 8020

spring:
  datasource:
    driver-class-name: com.mysql.jdbc.Driver
    url: jdbc:mysql://localhost:3306/db_elasticjob?characterEncoding=utf-8&useSSL=false&serverTimezone=GMT%2B8
    username: root
    password: root
# elasticjob配置参数
elasticjob:
  zk-server-list: localhost:2181
  zk-namespace: elastic-job
  startedTimeoutMilliseconds: 5000
  completedTimeoutMilliseconds: 5000
  dump-port: 9888
